<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>拼音小勇士·迷宫大冒险</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#1a0a2e; font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif; touch-action:manipulation; user-select:none; -webkit-user-select:none; }

#game-container {
  position:relative; width:100vw; height:100vh; display:flex;
  flex-direction:column; align-items:center; justify-content:center;
}

/* 竖屏提示 */
#rotate-hint {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.9); z-index:9999; justify-content:center;
  align-items:center; flex-direction:column; color:#fff; font-size:24px; gap:20px;
}
#rotate-hint .icon { font-size:80px; animation:rotate-hint 2s infinite; }
@keyframes rotate-hint { 0%,100%{transform:rotate(0)} 50%{transform:rotate(90deg)} }
@media (orientation:portrait) { #rotate-hint { display:flex; } }

canvas { display:block; border-radius:12px; box-shadow:0 0 40px rgba(100,200,255,0.3); }

/* 顶部状态栏 */
#side-left {
  position:absolute; left:6px; top:50%; transform:translateY(-50%);
  display:flex; flex-direction:column; align-items:center; gap:8px;
  padding:10px 6px; z-index:10;
  background:rgba(0,0,0,0.65); border-radius:20px;
  backdrop-filter:blur(8px); border:2px solid rgba(255,255,255,0.12);
  width:105px;
}
@keyframes carryFlash {
  0%,100% { box-shadow:0 0 4px rgba(255,255,255,0.3); transform:scale(1); }
  50% { box-shadow:0 0 16px rgba(255,215,0,0.9),0 0 28px rgba(255,215,0,0.5); transform:scale(1.12); }
}
.carried-letter {
  display:flex; flex-direction:column; align-items:center; gap:2px;
}
.carried-letter .card-icon {
  width:42px; height:42px; border-radius:12px; display:flex;
  align-items:center; justify-content:center; font-size:20px; font-weight:bold;
  color:#fff; transition:all 0.3s;
}
.carried-letter .card-icon.empty { background:rgba(255,255,255,0.08); border:2px dashed rgba(255,255,255,0.25); }
.carried-letter .card-icon.initial { background:#ff6b6b; border:2px solid #ff4444; animation:carryFlash 0.7s infinite; }
.carried-letter .card-icon.final { background:#4ecdc4; border:2px solid #2ecc71; }
.carried-letter .card-icon.overall { background:#a29bfe; border:2px solid #6c5ce7; }
.carried-letter .label { color:#aaa; font-size:10px; }
.energy-display { display:flex; flex-direction:column; align-items:center; gap:1px; }
.energy-star { font-size:18px; transition:all 0.3s; }
.energy-star.inactive { opacity:0.2; transform:scale(0.75); }
.level-name { color:#fff; font-size:11px; font-weight:bold; text-align:center; line-height:1.3; white-space:normal; }
.sidebar-section { width:100%; display:flex; flex-direction:column; gap:2px; }
.section-title { color:#888; font-size:9px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:1px; margin-bottom:2px; }
.letters-grid { display:flex; flex-wrap:wrap; gap:2px; justify-content:center; max-height:130px; overflow-y:auto; }
.letter-chip { width:22px; height:22px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold; color:#fff; transition:all 0.3s; }
.letter-chip.initial { background:#ff6b6b; border:1px solid #ff4444; }
.letter-chip.final { background:#4ecdc4; border:1px solid #2ecc71; }
.letter-chip.overall { background:#a29bfe; border:1px solid #6c5ce7; }
.letter-chip.collected { opacity:0.25; }
.letter-chip.carried { animation:carryFlash 0.7s infinite; z-index:1; }
.combos-list { display:flex; flex-direction:column; gap:1px; max-height:80px; overflow-y:auto; font-size:9px; color:#ffd700; text-align:center; word-break:break-all; }

/* 底部按钮栏 */
#side-right {
  position:absolute; right:6px; top:50%; transform:translateY(-50%);
  display:flex; flex-direction:column; gap:8px; z-index:10;
  padding:8px; width:85px;
  background:rgba(0,0,0,0.5); border-radius:18px;
  backdrop-filter:blur(8px); border:2px solid rgba(255,255,255,0.1);
}
.game-btn {
  padding:8px 6px; border-radius:14px; border:none; font-size:13px;
  font-weight:bold; cursor:pointer; transition:all 0.2s;
  font-family:inherit; color:#fff; backdrop-filter:blur(10px);
}
.game-btn:hover { transform:scale(1.05); }
.game-btn:active { transform:scale(0.95); }
#btn-back { background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.3); }
#btn-reset { background:rgba(255,165,0,0.3); border:2px solid rgba(255,165,0,0.5); }
#btn-hint { background:rgba(100,200,255,0.3); border:2px solid rgba(100,200,255,0.5); }
#btn-sound { background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.3); font-size:16px; padding:8px 6px; }

/* 关卡选择面板 */
#level-select {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:20;
  display:flex; flex-direction:column; align-items:center; gap:20px;
}
#level-select h1 {
  color:#fff; font-size:36px; text-align:center;
  text-shadow:0 0 20px rgba(100,200,255,0.5);
}
#level-select .subtitle { color:#aaa; font-size:16px; margin-top:-10px; }
.level-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.level-card {
  width:120px; height:120px; border-radius:16px; display:flex;
  flex-direction:column; align-items:center; justify-content:center;
  gap:8px; cursor:pointer; transition:all 0.3s; border:3px solid;
  font-family:inherit; font-size:14px; color:#fff;
}
.level-card:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
.level-card.locked { opacity:0.4; cursor:not-allowed; }
.level-card.locked:hover { transform:none; box-shadow:none; }
.level-num { font-size:28px; font-weight:bold; }
.level-stars { font-size:18px; }

/* 弹窗 */
.overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  display:flex; align-items:center; justify-content:center; z-index:30;
  background:rgba(0,0,0,0.7); animation:fadeIn 0.3s;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.popup {
  background:linear-gradient(135deg,#1a1a2e,#16213e);
  border-radius:20px; padding:32px; text-align:center;
  border:3px solid rgba(255,255,255,0.2); color:#fff;
  max-width:420px; width:90%;
}
.popup h2 { font-size:28px; margin-bottom:12px; }
.popup .stars-display { font-size:40px; margin:12px 0; }
.popup p { color:#ccc; margin:8px 0; }
.popup-btns { display:flex; gap:12px; justify-content:center; margin-top:20px; flex-wrap:wrap; }

/* 提示浮层 */
#toast {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  pointer-events:none; z-index:25; color:#fff; font-size:28px; font-weight:bold;
  text-shadow:0 0 10px rgba(255,255,255,0.5);
  animation:toastPop 0.8s ease-out forwards; white-space:nowrap;
}
@keyframes toastPop {
  0% { opacity:0; transform:translate(-50%,-50%) scale(0.5); }
  30% { opacity:1; transform:translate(-50%,-50%) scale(1.2); }
  100% { opacity:0; transform:translate(-50%,-70%) scale(1); }
}

/* 组合反馈 */
#combo-text {
  position:absolute; pointer-events:none; z-index:25;
  font-size:32px; font-weight:bold; color:#ffd700;
  text-shadow:0 0 15px rgba(255,215,0,0.8);
  animation:comboFloat 1s ease-out forwards;
}
@keyframes comboFloat {
  0% { opacity:1; transform:translateY(0) scale(0.5); }
  50% { opacity:1; transform:translateY(-30px) scale(1.1); }
  100% { opacity:0; transform:translateY(-60px) scale(1); }
}
</style>
</head>
<body>
<div id="rotate-hint">
  <div class="icon">📱</div>
  <div>请横屏使用以获得最佳体验</div>
</div>

<div id="game-container">
  <canvas id="game-canvas"></canvas>

  <div id="side-left" style="display:none">
    <div class="level-name" id="level-name-display"></div>
    <div class="carried-letter">
      <span class="label">携带中</span>
      <div class="card-icon empty" id="carried-icon"></div>
    </div>
    <div class="energy-display" id="energy-display"></div>
    <div class="sidebar-section">
      <div class="section-title">关卡字母</div>
      <div class="letters-grid" id="letters-grid"></div>
    </div>
    <div class="sidebar-section">
      <div class="section-title">已拼成</div>
      <div class="combos-list" id="combos-list"></div>
    </div>
  </div>

  <div id="side-right" style="display:none">
    <button class="game-btn" id="btn-back">选关</button>
    <button class="game-btn" id="btn-reset">重置</button>
    <button class="game-btn" id="btn-hint">提示</button>
    <button class="game-btn" id="btn-sound">🔊</button>
  </div>

  <div id="level-select"></div>
  <div id="toast"></div>
  <div id="combo-text"></div>
</div>

// =========================== 随机迷宫生成 ===========================
function SeededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

function generateMaze(cols, rows, seed) {
  // 确保尺寸为奇数（迷宫算法需要）
  if (cols % 2 === 0) cols--;
  if (rows % 2 === 0) rows--;
  const rand = SeededRandom(seed);
  const grid = Array.from({length: rows}, () => Array(cols).fill(1));

  // 递归回溯法生成完美迷宫
  const stack = [[1, 1]];
  grid[1][1] = 0;

  while (stack.length > 0) {
    const [cx, cy] = stack[stack.length - 1];
    const neighbors = [];
    for (const [dx, dy] of [[0, -2], [2, 0], [0, 2], [-2, 0]]) {
      const nx = cx + dx, ny = cy + dy;
      if (nx > 0 && nx < cols - 1 && ny > 0 && ny < rows - 1 && grid[ny][nx] === 1) {
        neighbors.push([nx, ny, dx / 2, dy / 2]);
      }
    }
    if (neighbors.length === 0) {
      stack.pop();
    } else {
      const [nx, ny, wx, wy] = neighbors[Math.floor(rand() * neighbors.length)];
      grid[cy + wy][cx + wx] = 0;
      grid[ny][nx] = 0;
      stack.push([nx, ny]);
    }
  }

  // 极少环路（保持大量死胡同，增加探索难度）
  const loopCount = Math.floor(cols * rows * 0.015);
  for (let i = 0; i < loopCount; i++) {
    const x = 2 + Math.floor(rand() * (cols - 4));
    const y = 2 + Math.floor(rand() * (rows - 4));
    if (grid[y][x] === 1) {
      let floorNeighbors = 0;
      for (const [dx, dy] of [[0, -1], [1, 0], [0, 1], [-1, 0]]) {
        if (grid[y + dy][x + dx] === 0) floorNeighbors++;
      }
      if (floorNeighbors >= 2) grid[y][x] = 0;
    }
  }

  // 放置起点
  grid[1][1] = 2;

  // 放置终点（右下角区域），出口被两道墙封锁，需更多能量破墙
  const ex = cols - 2, ey = rows - 2;
  grid[ey][ex] = 3;
  // 堵住出口上方
  if (grid[ey - 1][ex] === 0) {
    grid[ey - 1][ex] = 1;
    if (grid[ey - 1][ex - 1] === 1) grid[ey - 1][ex - 1] = 0;
  }
  // 堵住出口左侧
  if (grid[ey][ex - 1] === 0) grid[ey][ex - 1] = 1;
  // 在出口左侧加第二道墙
  if (ex >= 3 && grid[ey][ex - 2] === 0) {
    grid[ey][ex - 2] = 1;
    // 确保有路径可到达第二道墙旁边
    if (grid[ey - 1][ex - 2] === 1) grid[ey - 1][ex - 2] = 0;
  }

  return grid;
}

// 在地板上随机放置卡片
function placeCards(grid, config, seed) {
  const rand = SeededRandom(seed + 1000);
  const rows = grid.length, cols = grid[0].length;
  const floors = [];
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      // 收集所有地板格子（排除起点和出口）
      if (grid[y][x] === 0) {
        // 离起点至少3步距离
        if (Math.abs(x - 1) + Math.abs(y - 1) >= 4) {
          floors.push({x, y});
        }
      }
    }
  }

  // 打乱地板位置
  for (let i = floors.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [floors[i], floors[j]] = [floors[j], floors[i]];
  }

  // 放置卡片
  const cards = [];
  let idx = 0;
  const allLetters = [...config.initials, ...config.finals, ...config.overalls];

  // 确保组合所需的配对在迷宫不同区域
  const paired = new Set();
  for (const combo of config.requiredCombos) {
    paired.add(combo[0]);
    paired.add(combo[1]);
  }

  // 先放置配对卡片（确保它们在迷宫中）
  const pairedLetters = [];
  const otherLetters = [];
  for (const letter of allLetters) {
    if (paired.has(letter)) {
      pairedLetters.push(letter);
    } else {
      otherLetters.push(letter);
    }
  }

  // 放置所有卡片
  const placed = [...pairedLetters, ...otherLetters];
  for (let i = 0; i < Math.min(placed.length, floors.length); i++) {
    cards.push({
      x: floors[i].x,
      y: floors[i].y,
      letter: placed[i],
      collected: false,
      idx: i
    });
  }

  return cards;
}

const Audio = {
  ctx: null,
  init() {
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { this.ctx = null; }
  },
  play(freq, duration, type='sine', vol=0.1) {
    if (!this.ctx || !state.soundOn) return;
    try {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = type; osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.start(); osc.stop(this.ctx.currentTime + duration);
    } catch(e) {}
  },

// =========================== 粒子系统 ===========================
class ParticleSystem {
  constructor() { this.particles = []; }
  emit(x, y, count, config={}) {
    for (let i=0;i<count;i++) {
      const angle = Math.random()*Math.PI*2;
      const speed = (config.speed||2) * (0.5+Math.random());
      this.particles.push({
        x, y,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed - (config.upward||0),
        life: 1,
        decay: 0.02 + Math.random()*0.03,
        size: config.size||4 + Math.random()*6,
        color: config.colors[Math.floor(Math.random()*config.colors.length)],
      });
    }
  }
  update() {
    for (let i=this.particles.length-1;i>=0;i--) {
      const p = this.particles[i];
      p.x += p.vx; p.y += p.vy; p.life -= p.decay;
      if (p.life <= 0) this.particles.splice(i,1);
    }
  }
  draw(ctx) {
    for (const p of this.particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  clear() { this.particles = []; }
}

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

let cellSize = 0, offsetX = 0, offsetY = 0;

function calcLayout() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const SIDE_LEFT = 115;
  const SIDE_RIGHT = 90;
  const availW = w - SIDE_LEFT - SIDE_RIGHT - 8;
  const availH = h - 12;
  const level = state.currentLevel;
  if (!level) return;
  const [cols, rows] = level.size;
  cellSize = Math.floor(Math.min(availW/cols, availH/rows));
  offsetX = SIDE_LEFT + Math.floor((availW - cellSize*cols) / 2);
  offsetY = Math.floor((h - cellSize*rows) / 2);
  canvas.width = w;
  canvas.height = h;
}

// 主题颜色
const THEMES = {
  '森林': { bg:'#2d5016', floor:'#5a9e3e', wall:'#3d2817', wallTop:'#5c3d2e', start:'#7ec850', exit:'#ffd700' },
  '草原': { bg:'#4a7c2e', floor:'#8bc34a', wall:'#5d4037', wallTop:'#795548', start:'#aed581', exit:'#ffeb3b' },
  '糖果': { bg:'#e91e63', floor:'#f8bbd0', wall:'#7b1fa2', wallTop:'#9c27b0', start:'#ff80ab', exit:'#ffd740' },
  '星空': { bg:'#1a237e', floor:'#3949ab', wall:'#0d0d2b', wallTop:'#1a1a4e', start:'#5c6bc0', exit:'#ffd54f' },
  '彩虹': { bg:'#4a148c', floor:'#7b1fa2', wall:'#311b92', wallTop:'#4527a0', start:'#ce93d8', exit:'#ffea00' },
};

function drawMaze() {
  const level = state.currentLevel;
  if (!level) return;
  const theme = THEMES[level.theme] || THEMES['森林'];
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // 背景
  ctx.fillStyle = theme.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const [cols, rows] = level.size;
  for (let y=0; y<rows; y++) {
    for (let x=0; x<cols; x++) {
      const cx = offsetX + x*cellSize, cy = offsetY + y*cellSize;
      const cell = state.grid[y][x];

      if (cell === 1) {
        // 墙壁 - 3D效果
        ctx.fillStyle = theme.wall;
        ctx.fillRect(cx+2, cy+2, cellSize-4, cellSize-4);
        ctx.fillStyle = theme.wallTop;
        ctx.fillRect(cx+2, cy+2, cellSize-4, cellSize*0.35);
        // 边缘
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 1;
        ctx.strokeRect(cx+2, cy+2, cellSize-4, cellSize-4);
      } else {
        // 地板
        ctx.fillStyle = theme.floor;
        ctx.fillRect(cx+1, cy+1, cellSize-2, cellSize-2);
        // 网格线
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1;
        ctx.strokeRect(cx+1, cy+1, cellSize-2, cellSize-2);

        // 起点标记
        if (cell === 2) {
          ctx.fillStyle = theme.start;
          ctx.beginPath();
          ctx.arc(cx+cellSize/2, cy+cellSize/2, cellSize*0.3, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.font = `${cellSize*0.3}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('▶', cx+cellSize/2, cy+cellSize/2);
        }
        // 出口标记
        if (cell === 3) {
          const pulse = 0.7 + 0.3*Math.sin(Date.now()/400);
          ctx.fillStyle = theme.exit;
          ctx.globalAlpha = pulse;
          ctx.beginPath();
          ctx.arc(cx+cellSize/2, cy+cellSize/2, cellSize*0.25, 0, Math.PI*2);
          ctx.fill();
          ctx.globalAlpha = 1;
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.fillStyle = '#fff';
          ctx.font = 'bold '+(cellSize*0.3)+'px sans-serif';
          ctx.fillText('🚩', cx+cellSize/2, cy+cellSize/2);
        }
      }
    }
  }

  // 提示高亮
  if (state.hintActive && state.carried) {
    const targetType = state.carried.type === 'initial' ? 'final' : 'initial';
    const validCards = state.cards.filter(c => {
      if (c.collected) return false;
      if (PINYIN.getType(c.letter) === 'overall') return false;
      if (PINYIN.getType(c.letter) !== targetType) return false;
      return PINYIN.checkCombo(state.carried.letter, c.letter) !== null;
    });
    for (const card of validCards) {
      const cx = offsetX + card.x*cellSize + cellSize/2;
      const cy = offsetY + card.y*cellSize + cellSize/2;
      const pulse = 0.5 + 0.3*Math.sin(Date.now()/300);
      ctx.strokeStyle = `rgba(255,215,0,${pulse})`;
      ctx.lineWidth = 3;
      ctx.setLineDash([4,4]);
      ctx.strokeRect(cx-cellSize*0.45, cy-cellSize*0.45, cellSize*0.9, cellSize*0.9);
      ctx.setLineDash([]);
    }
  }

  // 字母卡片
  for (const card of state.cards) {
    if (card.collected) continue;
    const cx = offsetX + card.x*cellSize + cellSize/2;
    const cy = offsetY + card.y*cellSize + cellSize/2;
    const type = PINYIN.getType(card.letter);
    let cardColor, borderColor;
    if (type === 'initial') { cardColor = '#ff6b6b'; borderColor = '#ff4444'; }
    else if (type === 'final') { cardColor = '#4ecdc4'; borderColor = '#2ecc71'; }
    else { cardColor = '#a29bfe'; borderColor = '#6c5ce7'; }

    // 卡片背景
    const cw = cellSize*0.7, ch = cellSize*0.7;
    const r = cellSize*0.12;
    ctx.fillStyle = cardColor;
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = 4;
    roundRect(cx-cw/2, cy-ch/2, cw, ch, r);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // 字母文字
    ctx.fillStyle = '#fff';
    ctx.font = 'bold '+(cellSize*0.48)+'px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(card.letter, cx, cy);

    // 类型小标记
    ctx.fillStyle = borderColor;
    ctx.beginPath();
    ctx.arc(cx+cw/2-4, cy-ch/2+4, 4, 0, Math.PI*2);
    ctx.fill();
  }

  // 路径预览
  if (state.path.length > 1) {
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 3;
    ctx.setLineDash([6,6]);
    ctx.beginPath();
    ctx.moveTo(offsetX+state.path[0].x*cellSize+cellSize/2, offsetY+state.path[0].y*cellSize+cellSize/2);
    for (let i=1;i<state.path.length;i++) {
      ctx.lineTo(offsetX+state.path[i].x*cellSize+cellSize/2, offsetY+state.path[i].y*cellSize+cellSize/2);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // 角色（动画时使用插值位置）
  let px, py;
  if (canvas._animating) {
    px = canvas._animX;
    py = canvas._animY;
  } else {
    px = offsetX + state.playerPos.x*cellSize + cellSize/2;
    py = offsetY + state.playerPos.y*cellSize + cellSize/2;
  }
  drawCharacter(px, py, cellSize*0.38);

  // 粒子
  if (state.particleSystem) {
    state.particleSystem.draw(ctx);
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function drawCharacter(x, y, r) {
  // 身体
  const bodyGrad = ctx.createRadialGradient(x-r*0.2, y-r*0.2, r*0.1, x, y, r);
  bodyGrad.addColorStop(0, '#ffe082');
  bodyGrad.addColorStop(1, '#ff9800');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#e65100';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 眼睛
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x-r*0.3, y-r*0.2, r*0.32, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+r*0.3, y-r*0.2, r*0.32, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(x-r*0.2, y-r*0.15, r*0.15, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+r*0.4, y-r*0.15, r*0.15, 0, Math.PI*2); ctx.fill();

  // 微笑
  ctx.strokeStyle = '#e65100';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(x, y+r*0.05, r*0.3, 0.1*Math.PI, 0.9*Math.PI);
  ctx.stroke();

  // 携带字母
  if (state.carried) {
    const type = state.carried.type;
    const color = type==='initial'?'#ff6b6b':type==='final'?'#4ecdc4':'#a29bfe';
    ctx.fillStyle = color;
    const bw = r*0.9, bh = r*0.7;
    roundRect(x-bw, y-r*1.6, bw*2, bh, r*0.25);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold '+(r*0.7)+'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(state.carried.letter, x, y-r*1.6+bh/2);
  }
}

// =========================== BFS寻路 ===========================
function findPath(from, to) {
  const [cols, rows] = state.currentLevel.size;
  const visited = Array.from({length:rows}, ()=>Array(cols).fill(false));
  const parent = Array.from({length:rows}, ()=>Array(cols).fill(null));
  const queue = [from];
  visited[from.y][from.x] = true;

  while (queue.length > 0) {
    const cur = queue.shift();
    if (cur.x === to.x && cur.y === to.y) {
      // 重建路径
      const path = [];
      let p = cur;
      while (p) { path.unshift(p); p = parent[p.y][p.x]; }
      return path;
    }
    for (const [dx,dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      const nx = cur.x+dx, ny = cur.y+dy;
      if (nx<0||nx>=cols||ny<0||ny>=rows) continue;
      if (visited[ny][nx]) continue;
      if (state.grid[ny][nx] === 1) continue; // 墙壁
      visited[ny][nx] = true;
      parent[ny][nx] = cur;
      queue.push({x:nx, y:ny});
    }
  }
  return null; // 无路可达
}

// =========================== 游戏逻辑 ===========================
function startLevel(levelId) {
  const config = LEVEL_CONFIGS.find(l=>l.id===levelId);
  if (!config) return;

  // 生成迷宫（使用关卡ID作为种子，保证同一关卡迷宫一致）
  const [cols, rows] = config.size;
  const grid = generateMaze(cols, rows, levelId * 12345 + 67890);
  const cards = placeCards(grid, config, levelId * 98765 + 43210);

  // 构建关卡对象（兼容旧代码，size取实际grid尺寸）
  const level = {
    ...config,
    size: [grid[0].length, grid.length], // 实际生成的迷宫尺寸（可能被调整过）
    grid: grid,
    cards: cards,
  };

  state.currentLevel = level;
  state.grid = grid;
  state.cards = cards;
  state.carried = null;
  state.energy = 0;
  state.completedCombos = [];
  state.path = [];
  state.moving = false;
  state.hintActive = false;
  state.particleSystem = new ParticleSystem();

  // 找起点
  for (let y=0;y<grid.length;y++)
    for (let x=0;x<grid[0].length;x++)
      if (state.grid[y][x]===2) { state.playerPos = {x,y}; }

  calcLayout();
  showGameUI();
  updateUI();
  startGameLoop();

  setTimeout(()=>speak(level.name.replace(/第\d+关[·•]/,'')), 500);
}

function showGameUI() {
  document.getElementById('side-left').style.display = 'flex';
  document.getElementById('side-right').style.display = 'flex';
  document.getElementById('level-select').style.display = 'none';
  document.querySelectorAll('.overlay').forEach(e=>e.remove());
}

function updateUI() {
  // 携带字母
  const icon = document.getElementById('carried-icon');
  icon.className = 'card-icon';
  if (state.carried) {
    icon.classList.add(state.carried.type);
    icon.textContent = state.carried.letter;
    icon.classList.remove('empty');
  } else {
    icon.classList.add('empty');
    icon.textContent = '?';
  }

  // 能量显示
  const ed = document.getElementById('energy-display');
  let stars = '';
  for (let i=0;i<state.maxEnergy;i++) {
    stars += `<span class="energy-star${i>=state.energy?' inactive':''}">⚡</span>`;
  }
  ed.innerHTML = stars;

  // 关卡名
  document.getElementById('level-name-display').textContent = state.currentLevel.name;

  // 字母网格（去重）
  const grid = document.getElementById('letters-grid');
  const level = state.currentLevel;
  const allLetters = [...new Set([...level.initials, ...level.finals, ...level.overalls])];
  let html = '';
  for (const letter of allLetters) {
    const type = PINYIN.getType(letter);
    const collected = state.cards.find(c => c.letter === letter && c.collected);
    const isCarried = state.carried && state.carried.letter === letter;
    let cls = 'letter-chip ' + type;
    if (collected) cls += ' collected';
    if (isCarried) cls += ' carried';
    html += `<div class="${cls}">${letter}</div>`;
  }
  grid.innerHTML = html;

  // 已拼组合（显示拼音如 p+o=po，不显示汉字）
  const list = document.getElementById('combos-list');
  list.innerHTML = state.completedCombos.map(c => {
    if (typeof c === 'string' && c.includes('+')) {
      const parts = c.split('+');
      const a = parts[0], b = parts.slice(1).join('+');
      const result = PINYIN.checkCombo(a, b);
      if (result) {
        const [hz, py] = result.split('-');
        const plain = py.normalize('NFD').replace(/[̀-ͯ]/g, '');
        return `<span>${a}+${b}=${plain}</span>`;
      }
    }
    return `<span>${c}</span>`;
  }).join('');
}

function movePlayer(targetX, targetY) {
  if (state.moving) return;

  const cell = state.grid[targetY]?.[targetX];
  if (cell === undefined || cell === 1) {
    // 检查是否是相邻墙壁（破墙）
    if (cell === 1) {
      const dx = Math.abs(targetX - state.playerPos.x);
      const dy = Math.abs(targetY - state.playerPos.y);
      if (dx+dy === 1) {
        if (state.energy > 0) {
          breakWall(targetX, targetY);
        } else {
          showToast('需要能量才能破墙！先收集字母组合吧~');
        }
        return;
      }
    }
    return;
  }

  const path = findPath(state.playerPos, {x:targetX, y:targetY});
  if (!path || path.length <= 1) return;

  state.path = path;
  state.moving = true;
  executePath(0);
}

function executePath(idx) {
  if (idx >= state.path.length) {
    state.moving = false;
    state.path = [];
    checkWin();
    return;
  }

  const target = state.path[idx];
  animateStep(state.playerPos, target, () => {
    state.playerPos = target;
    // 检查卡片
    const card = state.cards.find(c => !c.collected && c.x===target.x && c.y===target.y);
    if (card) collectCard(card);

    updateUI();
    executePath(idx+1);
  });
}

function animateStep(from, to, callback) {
  const duration = 120;
  const startTime = performance.now();
  const startX = offsetX + from.x*cellSize + cellSize/2;
  const startY = offsetY + from.y*cellSize + cellSize/2;
  const endX = offsetX + to.x*cellSize + cellSize/2;
  const endY = offsetY + to.y*cellSize + cellSize/2;

  function anim(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed/duration, 1);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    const cx = startX + (endX-startX)*ease;
    const cy = startY + (endY-startY)*ease;

    // 临时存储动画位置
    canvas._animX = cx;
    canvas._animY = cy;
    canvas._animating = true;
    drawMaze();

    if (t < 1) {
      requestAnimationFrame(anim);
    } else {
      canvas._animating = false;
      drawMaze();
      callback();
    }
  }
  requestAnimationFrame(anim);
}

function collectCard(card) {
  const type = PINYIN.getType(card.letter);
  const cx = offsetX + card.x*cellSize + cellSize/2;
  const cy = offsetY + card.y*cellSize + cellSize/2;

  if (type === 'overall') {
    // 整体认读，直接给能量，不影响携带字母
    card.collected = true;
    Audio.sfx_pickup();
    state.particleSystem.emit(cx, cy, 12, {colors:['#ffd700','#ff6b6b','#4ecdc4','#fff'],speed:3,size:3,upward:1});
    const info = PINYIN.overallMap[card.letter];
    if (state.energy < state.maxEnergy) {
      state.energy++;
      showToast(`整体认读: ${info||card.letter} ⚡+1`);
      speak((PINYIN.pronounce[card.letter]||card.letter) + (info ? '，'+info.split('-')[0] : ''));
      Audio.sfx_success();
      state.particleSystem.emit(cx, cy, 20, {colors:['#ffd700','#ffeb3b'],speed:4,size:5,upward:2});
    }
    state.completedCombos.push(card.letter);
    updateUI();
    return;
  }

  // 规则：只能先携带声母，韵母不可单独携带
  if (!state.carried) {
    if (type === 'initial') {
      // 拾取声母
      card.collected = true;
      Audio.sfx_pickup();
      state.particleSystem.emit(cx, cy, 12, {colors:['#ffd700','#ff6b6b'],speed:3,size:3,upward:1});
      state.carried = {letter:card.letter, type, cardIdx:card.idx};
      speak(PINYIN.pronounce[card.letter] || card.letter);
    } else {
      // 韵母不能单独拾取
      showToast('先收集声母吧！🔤');
    }
    updateUI();
    return;
  }

  // 已携带声母
  if (type === 'initial') {
    // 已携带声母，不能重复拾取声母
    showToast('已经携带声母了，去找韵母组合吧！');
    return;
  }

  // type === 'final'，检查拼音组合
  const result = PINYIN.checkCombo(state.carried.letter, card.letter);
  if (result) {
    card.collected = true;
    Audio.sfx_pickup();
    state.particleSystem.emit(cx, cy, 12, {colors:['#ffd700','#4ecdc4','#fff'],speed:3,size:3,upward:1});
    const [hz, py] = result.split('-');
    const plainPy = py.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    showComboFeedback(cx, cy, `${state.carried.letter}+${card.letter}=${plainPy}`);
    speak(`${PINYIN.pronounce[state.carried.letter]||state.carried.letter}+${PINYIN.pronounce[card.letter]||card.letter}，拼成${hz}`);
    Audio.sfx_success();
    if (state.energy < state.maxEnergy) state.energy++;
    state.particleSystem.emit(cx, cy, 25, {colors:['#ffd700','#ff6b6b','#4ecdc4','#ffeb3b','#fff'],speed:5,size:4,upward:2});
    state.completedCombos.push(`${state.carried.letter}+${card.letter}`);
    state.carried = null;
  } else {
    // 不能组合，保留声母
    showToast('不能拼在一起哦~');
    Audio.sfx_fail();
  }
  updateUI();
}

function breakWall(x, y) {
  state.grid[y][x] = 0;
  state.energy--;
  Audio.sfx_break();
  const cx = offsetX + x*cellSize + cellSize/2;
  const cy = offsetY + y*cellSize + cellSize/2;
  state.particleSystem.emit(cx, cy, 20, {
    colors: ['#8d6e63','#a1887f','#bcaaa4','#d7ccc8','#fff'],
    speed: 4, size: 5,
  });
  updateUI();
  // 破墙后自动移动到该格子
  const path = findPath(state.playerPos, {x, y});
  if (path && path.length > 1) {
    state.path = path;
    state.moving = true;
    executePath(0);
  }
}

function checkWin() {
  const level = state.currentLevel;
  // 检查是否到达出口
  const exitCell = state.grid[state.playerPos.y][state.playerPos.x];
  if (exitCell === 3) {
    if (state.completedCombos.length >= level.minCombos) {
      winLevel();
    } else {
      showToast(`还需要完成 ${level.minCombos - state.completedCombos.length} 个拼音组合~`);
    }
  }
}

function winLevel() {
  state.moving = true; // 阻止进一步操作
  Audio.sfx_win();

  const level = state.currentLevel;
  const progress = loadProgress();
  const comboCount = state.completedCombos.length;
  const minRequired = level.minCombos;
  let stars = 1;
  if (comboCount >= level.requiredCombos.length) stars = 3;
  else if (comboCount >= minRequired + 1) stars = 2;

  const prev = progress[level.id];
  if (!prev || stars > prev.stars) {
    progress[level.id] = {stars, completed:true};
  }
  if (level.id < LEVEL_CONFIGS.length) {
    progress[level.id+1] = progress[level.id+1] || {completed:false, stars:0};
  }
  saveProgress(progress);

  speak('太棒了！你通过了！');

  // 粒子庆祝
  for (let i=0;i<5;i++) {
    setTimeout(()=>{
      state.particleSystem.emit(
        offsetX+Math.random()*cellSize*state.currentLevel.size[0],
        offsetY+Math.random()*cellSize*state.currentLevel.size[1],
        15, {colors:['#ffd700','#ff6b6b','#4ecdc4','#a29bfe','#ffeb3b'],speed:4,size:5,upward:2}
      );
    }, i*200);
  }

  setTimeout(()=>showWinPopup(stars), 600);
}

function showWinPopup(stars) {
  const level = state.currentLevel;
  const starEmoji = ['','⭐','🌟🌟','🌟🌟🌟'];
  const popup = document.createElement('div');
  popup.className = 'overlay';
  popup.innerHTML = `
    <div class="popup">
      <h2>🎉 恭喜过关！</h2>
      <div class="stars-display">${starEmoji[stars]}</div>
      <p>完成了 ${state.completedCombos.length} 个拼音组合</p>
      <p>破墙次数: ${state.maxEnergy-state.energy} 次</p>
      <div class="popup-btns">
        <button class="game-btn" id="btn-replay" style="background:rgba(255,165,0,0.3);border:2px solid rgba(255,165,0,0.5)">🔄 再玩一次</button>
        ${level.id < LEVEL_CONFIGS.length ? `<button class="game-btn" id="btn-next" style="background:rgba(100,200,255,0.3);border:2px solid rgba(100,200,255,0.5)">▶ 下一关</button>` : ''}
        <button class="game-btn" id="btn-select" style="background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3)">📋 选关</button>
      </div>
    </div>
  `;
  document.getElementById('game-container').appendChild(popup);

  popup.querySelector('#btn-replay').onclick = ()=>{ popup.remove(); startLevel(level.id); };
  popup.querySelector('#btn-select').onclick = ()=>{ popup.remove(); showLevelSelect(); };
  const nextBtn = popup.querySelector('#btn-next');
  if (nextBtn) nextBtn.onclick = ()=>{ popup.remove(); startLevel(level.id+1); };
}

function resetLevel() {
  Audio.sfx_click();
  startLevel(state.currentLevel.id);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.animation = 'none';
  toast.offsetHeight;
  toast.style.animation = 'toastPop 0.8s ease-out forwards';
}

function showComboFeedback(x, y, text) {
  const el = document.getElementById('combo-text');
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'comboFloat 1s ease-out forwards';
}

// =========================== 关卡选择 ===========================
function showLevelSelect() {
  stopGameLoop();
  document.getElementById('side-left').style.display = 'none';
  document.getElementById('side-right').style.display = 'none';
  document.querySelectorAll('.overlay').forEach(e=>e.remove());

  const progress = loadProgress();
  const container = document.getElementById('level-select');
  container.style.display = 'flex';

  let html = `
    <h1>拼音小勇士</h1>
    <div class="subtitle">迷宫大冒险</div>
    <div class="level-grid">
  `;

  const themes = ['🌳','🌿','🍬','⭐','🌈','🏰'];
  for (let i=0;i<LEVEL_CONFIGS.length;i++) {
    const lvl = LEVEL_CONFIGS[i];
    const p = progress[lvl.id];
    const locked = i>0 && !progress[lvl.id-1]?.completed;
    const stars = p?.stars || 0;
    const starStr = stars>0 ? '⭐'.repeat(stars) : '';
    html += `
      <div class="level-card${locked?' locked':''}" data-level="${lvl.id}"
           style="background:${locked?'#333':['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6'][i]};border-color:${locked?'#555':['#c0392b','#d35400','#f39c12','#27ae60','#2980b9','#8e44ad'][i]}">
        <div style="font-size:28px">${themes[i]}</div>
        <div class="level-num">${locked?'🔒':lvl.id}</div>
        <div style="font-size:13px">${lvl.name.replace(/第\d+关[·•]/,'')}</div>
        <div class="level-stars">${starStr||(locked?'':'☆')}</div>
      </div>
    `;
  }
  html += '</div>';
  container.innerHTML = html;

  container.querySelectorAll('.level-card:not(.locked)').forEach(card=>{
    card.addEventListener('click', ()=>{
      Audio.sfx_click();
      const id = parseInt(card.dataset.level);
      startLevel(id);
    });
  });

  // 不显示canvas（关卡选择时）
  ctx.clearRect(0,0,canvas.width,canvas.height);
  canvas.style.display = 'none';
}

// =========================== 游戏循环 ===========================
let gameLoopId;
function startGameLoop() {
  canvas.style.display = 'block';
  stopGameLoop();
  function loop() {
    if (state.currentLevel) {
      if (!state.moving) {
        if (state.particleSystem) state.particleSystem.update();
      }
      drawMaze();
    }
    gameLoopId = requestAnimationFrame(loop);
  }
  loop();
}

function stopGameLoop() {
  if (gameLoopId) { cancelAnimationFrame(gameLoopId); gameLoopId = null; }
}

// =========================== 事件处理 ===========================
canvas.addEventListener('click', (e) => {
  if (state.moving || !state.currentLevel) return;

  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const gridX = Math.floor((mx - offsetX) / cellSize);
  const gridY = Math.floor((my - offsetY) / cellSize);

  const level = state.currentLevel;
  if (gridX<0||gridX>=level.size[0]||gridY<0||gridY>=level.size[1]) return;

  movePlayer(gridX, gridY);
});

// 触摸支持
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (state.moving || !state.currentLevel) return;
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const mx = touch.clientX - rect.left;
  const my = touch.clientY - rect.top;
  const gridX = Math.floor((mx - offsetX) / cellSize);
  const gridY = Math.floor((my - offsetY) / cellSize);
  const level = state.currentLevel;
  if (gridX<0||gridX>=level.size[0]||gridY<0||gridY>=level.size[1]) return;
  movePlayer(gridX, gridY);
}, {passive:false});

// 按钮事件
document.getElementById('btn-back').addEventListener('click', ()=>{
  Audio.sfx_click();
  showLevelSelect();
});
document.getElementById('btn-reset').addEventListener('click', ()=>{
  Audio.sfx_click();
  resetLevel();
});
document.getElementById('btn-hint').addEventListener('click', ()=>{
  Audio.sfx_click();
  state.hintActive = !state.hintActive;
  if (state.hintActive) {
    showToast('提示：金色虚线框是匹配目标');
    setTimeout(()=>{ state.hintActive = false; }, 3000);
  }
});
document.getElementById('btn-sound').addEventListener('click', ()=>{
  state.soundOn = !state.soundOn;
  document.getElementById('btn-sound').textContent = state.soundOn ? '🔊' : '🔇';
});

// 窗口大小调整
window.addEventListener('resize', ()=>{
  if (state.currentLevel) calcLayout();
});

// 键盘控制（PC调试用方向键直接移动一步）
window.addEventListener('keydown', (e) => {
  if (state.moving || !state.currentLevel) return;
  const keyMap = {ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
  const dir = keyMap[e.key];
  if (dir) {
    e.preventDefault();
    const tx = state.playerPos.x + dir[0];
    const ty = state.playerPos.y + dir[1];
    movePlayer(tx, ty);
  }
});

// =========================== 初始化 ===========================
function init() {
  Audio.init();
  showLevelSelect();
  // 触摸事件需用户交互后才可播放音频
  document.addEventListener('click', ()=>{
    if (Audio.ctx && Audio.ctx.state==='suspended') Audio.ctx.resume();
  }, {once:true});
}

init();
</script>
